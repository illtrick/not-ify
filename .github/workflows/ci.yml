name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci --workspaces
      - name: Server tests (excluding flaky search tests)
        run: cd packages/server && npx jest --testPathIgnorePatterns='search.test'
      - run: npm run test -w @not-ify/client

  build-and-e2e:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Build production Docker image
        run: docker build -f docker/Dockerfile -t not-ify:ci .
      - name: Start container
        run: |
          mkdir -p music config
          docker run -d --name not-ify-ci -p 3000:3000 \
            -v $PWD/music:/app/music \
            -v $PWD/config:/app/config \
            not-ify:ci
      - name: Wait for server
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000/api/health && break
            sleep 1
          done
      - name: Create test user (first-run setup)
        run: |
          curl -sf http://localhost:3000/api/setup/status
          curl -sf -X POST http://localhost:3000/api/setup/account \
            -H "Content-Type: application/json" \
            -d '{"displayName":"CI Test"}'
          curl -sf -X POST http://localhost:3000/api/setup/complete
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test
      - name: Stop container
        if: always()
        run: docker stop not-ify-ci && docker rm not-ify-ci

  push-image:
    needs: build-and-e2e
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        run: |
          IMAGE=ghcr.io/${{ github.repository }}
          TAGS="-t $IMAGE:latest -t $IMAGE:${{ github.sha }}"
          # Add semver tag if this is a version tag push
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            TAGS="$TAGS -t $IMAGE:${VERSION}"
          fi
          docker build -f docker/Dockerfile $TAGS .
          docker push $IMAGE --all-tags

  # Create GitHub Release when a version tag is pushed
  release:
    needs: push-image
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Generate release notes
        id: notes
        run: |
          # Get previous tag
          PREV_TAG=$(git tag --sort=-version:refname | head -2 | tail -1)
          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "${GITHUB_REF#refs/tags/}" ]; then
            echo "notes=Initial release" >> $GITHUB_OUTPUT
          else
            NOTES=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s" --no-merges | head -20)
            # Write multiline to output
            echo "notes<<EOF" >> $GITHUB_OUTPUT
            echo "$NOTES" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Docker Image
            ```
            docker pull ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ```

            ## Changes
            ${{ steps.notes.outputs.notes }}
