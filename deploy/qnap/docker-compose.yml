# =============================================================================
# Not-ify — QNAP Deployment (Staging + Production + Watchtower + Gluetun VPN)
# =============================================================================
# Deploy: docker compose up -d
# Update prod version: edit .env, then docker compose up -d
#
# IMPORTANT: Volume paths use absolute /share/CACHEDEV1_DATA/ paths.
# Do NOT use relative paths or /share/DataVol1/ — that path resolves to a
# 16MB tmpfs on QNAP when the storage pool isn't mounted, causing SQLITE_FULL.
#
# Staging (:3001) — auto-updates via Watchtower when CI pushes to "latest"
# Production (:3000) — pinned to a version tag, only updates when you change .env
#
# Both services use network_mode: host so that the production instance can
# discover DLNA/UPnP renderers (Sonos, WiiM) via SSDP multicast.
# DLNA is enabled on both prod and staging for development iteration.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Production — pinned to a specific version tag
  # ---------------------------------------------------------------------------
  not-ify-prod:
    image: ghcr.io/illtrick/not-ify:${PROD_VERSION:-v0.1.0}
    container_name: not-ify-prod
    network_mode: host
    volumes:
      - /share/CACHEDEV1_DATA/not-ify/prod/music:/app/music
      - /share/CACHEDEV1_DATA/not-ify/prod/config:/app/config
    environment:
      - NODE_ENV=production
      - PORT=3000
      - CONFIG_DIR=/app/config
      - MUSIC_DIR=/app/music
      - LOG_LEVEL=warn
      - DLNA_ENABLED=true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ---------------------------------------------------------------------------
  # Staging — always runs "latest" (every CI push to main)
  # ---------------------------------------------------------------------------
  not-ify-staging:
    image: ghcr.io/illtrick/not-ify:latest
    container_name: not-ify-staging
    network_mode: host
    volumes:
      - /share/CACHEDEV1_DATA/not-ify/staging/music:/app/music
      - /share/CACHEDEV1_DATA/not-ify/staging/config:/app/config
    environment:
      - NODE_ENV=staging
      - PORT=3001
      - CONFIG_DIR=/app/config
      - MUSIC_DIR=/app/music
      - LOG_LEVEL=info
      - DLNA_ENABLED=true
      - VPN_ENABLED=${VPN_ENABLED:-false}
      - VPN_PROXY=http://localhost:8888
      - GLUETUN_CONTROL_URL=http://localhost:8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # ---------------------------------------------------------------------------
  # Gluetun VPN sidecar — HTTP proxy for staging (bridge mode, NOT host)
  # Exposes port 8888 (HTTP proxy) and 8000 (control API) to host network
  # ---------------------------------------------------------------------------
  gluetun:
    image: qmcgaw/gluetun
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - VPN_SERVICE_PROVIDER=private internet access
      - VPN_TYPE=openvpn
      - OPENVPN_USER=${PIA_USERNAME}
      - OPENVPN_PASSWORD=${PIA_PASSWORD}
      - SERVER_REGIONS=${VPN_REGION:-US West}
      - DOT=on
      - DOT_PROVIDERS=${DOT_PROVIDERS:-cloudflare}
      - HTTPPROXY=on
      - HTTPPROXY_LOG=off
      - HTTP_CONTROL_SERVER_AUTH_CONFIG_FILEPATH=
      - HTTP_CONTROL_SERVER_AUTH_DEFAULT_ROLE={"auth":"none"}
    ports:
      - "8888:8888/tcp"
      - "8000:8000/tcp"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://ip.me"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Watchtower — auto-updates staging container when "latest" tag changes
  # Only watches containers with the watchtower label (staging, not prod)
  # ---------------------------------------------------------------------------
  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /root/.docker/config.json:/config.json:ro
    environment:
      - WATCHTOWER_LABEL_ENABLE=true
      - WATCHTOWER_POLL_INTERVAL=300
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_INCLUDE_STOPPED=false
      - WATCHTOWER_NO_STARTUP_MESSAGE=false
    restart: unless-stopped
