# =============================================================================
# Not-ify — Dev overrides (hot reload, Ollama, debug logging)
# =============================================================================
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build

services:
  not-ify:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    volumes:
      # Source bind mounts for hot reload (overlay the COPY'd files)
      - ./packages/server/src:/app/packages/server/src
      - ./packages/client/src:/app/packages/client/src
      - ./packages/client/public:/app/packages/client/public
      - ./packages/shared/src:/app/packages/shared/src
      # Soulseek: read access to slskd downloads via shared bind mount
      - ./slskd-downloads:/app/slskd-downloads:ro
    environment:
      - NODE_ENV=development
      - OLLAMA_URL=http://ollama:11434
      - LOG_LEVEL=debug
      - SLSKD_DOWNLOADS_DIR=/app/slskd-downloads
    depends_on:
      ollama:
        condition: service_healthy

  slskd:
    image: slskd/slskd:latest
    ports:
      - "5030:5030"
      - "50300:50300"
    volumes:
      - slskd_data:/app
      # Bind mount so downloads are accessible from host and not-ify
      - ./slskd-downloads:/app/downloads
      - ./music:/music:ro
    environment:
      - SLSKD_REMOTE_CONFIGURATION=true
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_KEEP_ALIVE=300
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  ollama_data:
  slskd_data:
