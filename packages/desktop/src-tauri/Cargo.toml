[package]
name = "not-ify"
version = "1.2.0"
description = "Not-ify Desktop"
authors = []
edition = "2021"

[lib]
name = "not_ify_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-updater = "2"
tauri-plugin-shell = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
