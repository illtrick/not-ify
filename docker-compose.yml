# =============================================================================
# Not-ify — Base Docker Compose (shared between all environments)
# =============================================================================
# Usage:
#   Dev:  docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
#   Prod: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#   With VPN: add --profile vpn to any of the above

services:
  not-ify:
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - ./music:/app/music
      - ./config:/app/config
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - CONFIG_DIR=/app/config
      - MUSIC_DIR=/app/music
      - VPN_ENABLED=${VPN_ENABLED:-false}
      - VPN_PROXY=http://gluetun:8888
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  gluetun:
    image: qmcgaw/gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - VPN_SERVICE_PROVIDER=private internet access
      - VPN_TYPE=openvpn
      - OPENVPN_USER=${PIA_USERNAME}
      - OPENVPN_PASSWORD=${PIA_PASSWORD}
      - SERVER_REGIONS=${VPN_REGION:-US East}
      - DOT=on
      - DOT_PROVIDERS=${DOT_PROVIDERS:-cloudflare}
      - HTTPPROXY=on
      - HTTPPROXY_LOG=off
    ports:
      - "8888:8888/tcp"
    volumes:
      - gluetun-data:/gluetun
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://ip.me"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    profiles:
      - vpn

volumes:
  gluetun-data:
